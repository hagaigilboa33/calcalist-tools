<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל סטריפונים | כלכליסט</title>
  <style>
    :root {
      --red: #E31E24;
      --dark: #1a1a1a;
      --gray-bg: #f0f0f0;
      --border: #ddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--gray-bg); color: var(--dark); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--dark);
      border-bottom: 4px solid var(--red);
      padding: 11px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header img { height: 26px; border-radius: 3px; }
    .header-title { color: #aaa; font-size: 13px; }

    /* ── Layout: controls LEFT, preview RIGHT ── */
    .main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 270px 1fr;
      gap: 16px;
      align-items: start;
      direction: ltr;
    }
    .main > * { direction: rtl; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 1px 5px rgba(0,0,0,.09);
      margin-bottom: 14px;
      min-width: 0;
    }
    .card:last-child { margin-bottom: 0; }
    .card-title {
      font-size: 13px; font-weight: bold;
      margin-bottom: 14px; padding-bottom: 7px;
      border-bottom: 3px solid var(--red);
    }

    /* ── Upload ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 7px;
      padding: 24px 12px; text-align: center; cursor: pointer;
      background: #fafafa; transition: border-color .2s, background .2s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--red); background: #fff5f5; }
    .upload-zone .icon  { font-size: 32px; margin-bottom: 8px; }
    .upload-zone .main-t { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 3px; }
    .upload-zone .sub-t  { font-size: 10px; color: #999; }
    #imageInput { display: none; }

    /* ── Badge type ── */
    .badge-options { display: flex; gap: 8px; }
    .badge-opt {
      flex: 1; border: 2px solid var(--border); border-radius: 7px;
      padding: 8px 6px; text-align: center; cursor: pointer;
      font-size: 11px; font-weight: bold; transition: all .15s; min-width: 0;
    }
    .badge-opt .prev { height: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; overflow: hidden; }
    .badge-opt .prev img { max-height: 24px; max-width: 100%; object-fit: contain; border-radius: 3px; }
    .badge-opt:hover  { border-color: var(--red); }
    .badge-opt.active { border-color: var(--red); background: #fff5f5; }

    /* ── Sliders ── */
    .ctrl-label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
    .ctrl-group { margin-bottom: 12px; }
    input[type=range] { width: 100%; accent-color: var(--red); }
    .range-ends { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 1px; }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 11px;
      border: none; border-radius: 7px; font-size: 13px; font-weight: bold;
      cursor: pointer; margin-bottom: 8px;
    }
    .btn-dark { background: var(--dark); color: #fff; }
    .btn-dark:hover:not(:disabled) { background: #333; }
    .btn-secondary { background: var(--red); color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: #c41920; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .status { font-size: 11px; min-height: 15px; color: #888; margin-top: 4px; }
    .status.ok  { color: #2e7d32; }
    .status.err { color: var(--red); }

    /* ── Preview / Crop card ── */
    .preview-card {
      background: #fff; border-radius: 10px; padding: 18px;
      box-shadow: 0 1px 5px rgba(0,0,0,.09); min-width: 0; overflow: hidden;
    }
    #outputCanvas { display: none; }

    /* ── Crop editor ── */
    .crop-wrapper {
      position: relative; width: 100%;
      background: #555; border-radius: 6px;
      overflow: hidden; user-select: none; min-height: 80px;
    }
    #cropCanvas { display: block; width: 100%; height: auto; cursor: crosshair; }
    .crop-placeholder {
      position: absolute; inset: 0; min-height: 200px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #e8e8e8; color: #bbb; pointer-events: none; font-size: 14px;
    }
    .crop-placeholder .ph-icon { font-size: 40px; margin-bottom: 8px; }
    .crop-btns { display: flex; gap: 8px; margin-top: 10px; direction: rtl; align-items: center; }
    .btn-sm {
      padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; cursor: pointer; background: #fff;
      font-family: Arial, sans-serif; color: #333;
    }
    .btn-sm:hover { background: #f0f0f0; border-color: #aaa; }
    .crop-info { font-size: 11px; color: #999; margin-right: auto; }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; direction: rtl; }
    }
  </style>
</head>

<div class="main">

  <!-- ── LEFT: Controls ── -->
  <div>

    <div class="card">
      <div class="card-title">העלאת תמונה</div>
      <div class="upload-zone" id="uploadZone">
        <div class="icon">🖼️</div>
        <div class="main-t">גרור תמונה לכאן</div>
        <div class="sub-t">או לחץ לבחירת קובץ · JPG · PNG</div>
      </div>
      <input type="file" id="imageInput" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
      <div id="imageStatus" class="status"></div>
    </div>

    <div class="card">
      <div class="card-title">סוג סטריפון</div>
      <div class="badge-options">
        <div class="badge-opt active" data-type="standard">
          <div class="prev"><img src="calcalist-logo.jpg" alt="כלכליסט"></div>
          <div>כלכליסט</div>
        </div>
        <div class="badge-opt" data-type="tech">
          <div class="prev"><img src="CALCALISTH-TECH-LOGO-ACCURATE.jpeg" alt="כלכליסט טק"></div>
          <div>כלכליסט טק</div>
        </div>
      </div>
    </div>

    <div class="card">
      <button class="btn btn-dark" id="downloadBtn" disabled>⬇️ הורד JPEG</button>
      <button class="btn btn-secondary" id="sendBtn" disabled>✉️ שלח לגרפיקאית</button>
      <div id="dlStatus" class="status"></div>
    </div>

  </div>

  <!-- ── RIGHT: Crop editor ── -->
  <div class="preview-card">
    <div class="card-title">חתוך והתאם לסטריפון</div>
    <div class="crop-wrapper">
      <canvas id="cropCanvas"></canvas>
      <div class="crop-placeholder" id="cropPlaceholder">
        <div class="ph-icon">🖼️</div>
        <div>העלה תמונה כדי להתחיל</div>
      </div>
    </div>
    <div class="crop-btns">
      <button class="btn-sm" id="btnReset">אפס בחירה</button>
      <span class="crop-info">גרור את המלבן לשינוי מיקום · גרור פינה לשינוי גודל</span>
    </div>
  </div>

  let logoStdReady = false, logoTechReady = false;
  logoStd.onload  = () => { logoStdReady  = true; renderCropTool(); };
  logoTech.onload = () => { logoTechReady = true; renderCropTool(); };

  const OUT_W = 500, OUT_H = 282;
  const CROP_ASPECT = OUT_W / OUT_H;
  const HANDLE_R = 14; // hit radius in canvas pixels

  let uploadedImg = null, badgeType = 'standard';
  let imgDispScale = 1;
  // Crop rect in image pixel coordinates
  let cropX = 0, cropY = 0, cropW = 0, cropH = 0;
  // Drag state
  let dragMode = null; // null | 'move' | 'tl' | 'tr' | 'bl' | 'br'
  let dragStartIX = 0, dragStartIY = 0, dragStart = {};

  const uploadZone      = document.getElementById('uploadZone');
  const imageInput      = document.getElementById('imageInput');
  const downloadBtn     = document.getElementById('downloadBtn');
  const sendBtn         = document.getElementById('sendBtn');
  const dlStatus        = document.getElementById('dlStatus');
  const imgStatus       = document.getElementById('imageStatus');
  const cropPlaceholder = document.getElementById('cropPlaceholder');
  const outputCanvas    = document.getElementById('outputCanvas');
  const cropCanvasEl    = document.getElementById('cropCanvas');
  const cropCtx         = cropCanvasEl.getContext('2d');

  /* ── Upload ── */
  uploadZone.addEventListener('click', () => imageInput.click());
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', ()=> uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  imageInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  function loadFile(file) {
    if (!['image/jpeg','image/jpg','image/png'].includes(file.type)) {
      imgStatus.textContent = 'שגיאה: JPG או PNG בלבד';
      imgStatus.className = 'status err'; return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        uploadedImg = img;
        imgStatus.textContent = `✓ ${img.width}×${img.height}px`;
        imgStatus.className = 'status ok';
        initCropTool(img);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ── Init crop tool: set canvas size, reset crop rect ── */
  function initCropTool(img) {
    const containerW = cropCanvasEl.parentElement?.clientWidth || 700;
    imgDispScale = Math.min(containerW / img.naturalWidth, 520 / img.naturalHeight);
    cropCanvasEl.width  = Math.round(img.naturalWidth  * imgDispScale);
    cropCanvasEl.height = Math.round(img.naturalHeight * imgDispScale);
    resetCrop();
    renderCropTool();
  }

  /* ── Reset crop rect to best-fit at CROP_ASPECT ── */
  function resetCrop() {
    if (!uploadedImg) return;
    const iw = uploadedImg.naturalWidth, ih = uploadedImg.naturalHeight;
    if (iw / ih > CROP_ASPECT) {
      cropH = ih; cropW = cropH * CROP_ASPECT;
      cropX = (iw - cropW) / 2; cropY = 0;
    } else {
      cropW = iw; cropH = cropW / CROP_ASPECT;
      cropX = 0; cropY = (ih - cropH) / 2;
    }
  }

  document.getElementById('btnReset').addEventListener('click', () => {
    if (uploadedImg) { resetCrop(); renderCropTool(); }
  });

  /* ── Badge type ── */
  document.querySelectorAll('.badge-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.badge-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      badgeType = btn.dataset.type;
      renderCropTool();
    });
  });

  /* ── Sliders ── */

  /* ── Coordinate helpers ── */
  // Convert CSS-pixel mouse event to canvas-pixel coords
  function getCanvasCoords(e) {
    const r = cropCanvasEl.getBoundingClientRect();
    const scX = cropCanvasEl.width  / r.width;
    const scY = cropCanvasEl.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * scX, y: (src.clientY - r.top) * scY };
  }
  // Canvas pixels → image pixels
  function c2i(cx, cy) { return { x: cx / imgDispScale, y: cy / imgDispScale }; }
  // Crop rect in canvas pixels
  function getCropCanvas() {
    return { x: cropX * imgDispScale, y: cropY * imgDispScale,
             w: cropW * imgDispScale, h: cropH * imgDispScale };
  }

  /* ── Hit test: which handle is near (cx,cy) in canvas pixels ── */
  function getHandle(cx, cy) {
    const r = getCropCanvas();
    const corners = [
      { id: 'tl', x: r.x,       y: r.y },
      { id: 'tr', x: r.x + r.w, y: r.y },
      { id: 'bl', x: r.x,       y: r.y + r.h },
      { id: 'br', x: r.x + r.w, y: r.y + r.h },
    ];
    for (const c of corners)
      if (Math.hypot(cx - c.x, cy - c.y) <= HANDLE_R) return c.id;
    return null;
  }
  function isInsideCrop(cx, cy) {
    const r = getCropCanvas();
    return cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h;
  }

  /* ── Clamp crop rect within image ── */
  function clampCrop() {
    const iw = uploadedImg.naturalWidth, ih = uploadedImg.naturalHeight;
    cropW = Math.max(30, cropW);
    cropH = cropW / CROP_ASPECT;
    if (cropW > iw) { cropW = iw; cropH = cropW / CROP_ASPECT; }
    if (cropH > ih) { cropH = ih; cropW = cropH * CROP_ASPECT; }
    cropX = Math.max(0, Math.min(cropX, iw - cropW));
    cropY = Math.max(0, Math.min(cropY, ih - cropH));
  }

  /* ── Resize from corner (drag to new image-pixel position imgMX, imgMY) ── */
  function resizeCorner(handle, imgMX, imgMY) {
    const { cropX: ox, cropY: oy, cropW: ow, cropH: oh } = dragStart;
    let nw, nh, nx, ny;
    if (handle === 'br') {
      nw = imgMX - ox; nx = ox; ny = oy;
    } else if (handle === 'bl') {
      nw = (ox + ow) - imgMX; nx = (ox + ow) - nw; ny = oy;
    } else if (handle === 'tr') {
      nw = imgMX - ox; nx = ox; ny = oy + oh - nw / CROP_ASPECT;
    } else { // tl
      nw = (ox + ow) - imgMX; nx = (ox + ow) - nw; ny = oy + oh - nw / CROP_ASPECT;
    }
    cropX = nx; cropY = ny; cropW = nw; cropH = nw / CROP_ASPECT;
    clampCrop();
  }

  /* ── Mouse events ── */
  cropCanvasEl.addEventListener('mousedown', e => {
    if (!uploadedImg) return; e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const h = getHandle(x, y);
    dragMode = h || (isInsideCrop(x, y) ? 'move' : null);
    if (!dragMode) return;
    const ip = c2i(x, y);
    dragStartIX = ip.x; dragStartIY = ip.y;
    dragStart = { cropX, cropY, cropW, cropH };
  });
  window.addEventListener('mousemove', e => {
    if (!uploadedImg) return;
    const { x, y } = getCanvasCoords(e);
    if (dragMode) {
      const ip = c2i(x, y);
      if (dragMode === 'move') {
        cropX = dragStart.cropX + (ip.x - dragStartIX);
        cropY = dragStart.cropY + (ip.y - dragStartIY);
        clampCrop();
      } else {
        resizeCorner(dragMode, ip.x, ip.y);
      }
      renderCropTool();
    } else {
      // Update cursor
      const h = getHandle(x, y);
      if (h === 'tl' || h === 'br')      cropCanvasEl.style.cursor = 'nwse-resize';
      else if (h === 'tr' || h === 'bl') cropCanvasEl.style.cursor = 'nesw-resize';
      else if (isInsideCrop(x, y))       cropCanvasEl.style.cursor = 'move';
      else                               cropCanvasEl.style.cursor = 'crosshair';
    }
  });
  window.addEventListener('mouseup', () => { dragMode = null; });

  /* ── Touch events ── */
  cropCanvasEl.addEventListener('touchstart', e => {
    if (!uploadedImg || e.touches.length !== 1) return; e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const h = getHandle(x, y);
    dragMode = h || (isInsideCrop(x, y) ? 'move' : null);
    if (!dragMode) return;
    const ip = c2i(x, y);
    dragStartIX = ip.x; dragStartIY = ip.y;
    dragStart = { cropX, cropY, cropW, cropH };
  }, { passive: false });
  cropCanvasEl.addEventListener('touchmove', e => {
    if (!dragMode || !uploadedImg || e.touches.length !== 1) return; e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const ip = c2i(x, y);
    if (dragMode === 'move') {
      cropX = dragStart.cropX + (ip.x - dragStartIX);
      cropY = dragStart.cropY + (ip.y - dragStartIY);
      clampCrop();
    } else {
      resizeCorner(dragMode, ip.x, ip.y);
    }
    renderCropTool();
  }, { passive: false });
  cropCanvasEl.addEventListener('touchend', () => { dragMode = null; }, { passive: false });

  /* ── Render crop tool ── */
  function renderCropTool() {
    if (!uploadedImg) return;
    if (!logoStdReady) return;
    if (badgeType === 'tech' && !logoTechReady) return;
    cropPlaceholder.style.display = 'none';
    downloadBtn.disabled = false;
    sendBtn.disabled = false;

    const W = cropCanvasEl.width, H = cropCanvasEl.height;
    cropCtx.clearRect(0, 0, W, H);
    cropCtx.drawImage(uploadedImg, 0, 0, W, H);

    const cx = Math.round(cropX * imgDispScale);
    const cy = Math.round(cropY * imgDispScale);
    const cw = Math.round(cropW * imgDispScale);
    const ch = Math.round(cropH * imgDispScale);

    // Dimmed overlay (4 rects outside crop)
    cropCtx.fillStyle = 'rgba(0,0,0,0.55)';
    cropCtx.fillRect(0,       0,  W,          cy);
    cropCtx.fillRect(0,       cy, cx,         ch);
    cropCtx.fillRect(cx + cw, cy, W - cx - cw, ch);
    cropCtx.fillRect(0,  cy + ch, W,          H - cy - ch);

    // Badge preview scaled into crop rect
    cropCtx.save();
    cropCtx.beginPath(); cropCtx.rect(cx, cy, cw, ch); cropCtx.clip();
    cropCtx.translate(cx, cy);
    cropCtx.scale(cw / OUT_W, ch / OUT_H);
    composeBadge(cropCtx, OUT_W, OUT_H, badgeType);
    cropCtx.restore();

    // Dashed border
    cropCtx.save();
    cropCtx.strokeStyle = 'rgba(255,255,255,0.95)';
    cropCtx.lineWidth = 2;
    cropCtx.setLineDash([8, 5]);
    cropCtx.strokeRect(cx + 1, cy + 1, cw - 2, ch - 2);
    cropCtx.setLineDash([]);

    // Rule-of-thirds grid
    cropCtx.strokeStyle = 'rgba(255,255,255,0.22)';
    cropCtx.lineWidth = 1;
    cropCtx.beginPath();
    [1/3, 2/3].forEach(t => {
      cropCtx.moveTo(cx + cw * t, cy); cropCtx.lineTo(cx + cw * t, cy + ch);
      cropCtx.moveTo(cx, cy + ch * t); cropCtx.lineTo(cx + cw, cy + ch * t);
    });
    cropCtx.stroke();

    // Corner handles (filled circles)
    [[cx, cy], [cx + cw, cy], [cx, cy + ch], [cx + cw, cy + ch]].forEach(([hx, hy]) => {
      cropCtx.beginPath();
      cropCtx.arc(hx, hy, HANDLE_R * 0.7, 0, Math.PI * 2);
      cropCtx.fillStyle = 'rgba(255,255,255,0.92)';
      cropCtx.fill();
      cropCtx.strokeStyle = 'rgba(0,0,0,0.35)';
      cropCtx.lineWidth = 1.5;
      cropCtx.stroke();
    });
    cropCtx.restore();
  }

  /* ── composeBadge ──
     PSD-exact positions (500×282 canvas):
       standard : left=210 top=203  w=279 h=68
       tech     : left=185 top=174  w=288 h=98
     PNGs have alpha transparency — no clip path needed, just drawImage.
  */
  function composeBadge(ctx, W, H, type) {
    const scW = W / 500, scH = H / 282;
    if (type === 'standard') {
      ctx.drawImage(logoStd,
        Math.round(210 * scW), Math.round(203 * scH),
        Math.round(279 * scW), Math.round(68  * scH));
    } else if (type === 'tech') {
      ctx.drawImage(logoTech,
        Math.round(185 * scW), Math.round(174 * scH),
        Math.round(288 * scW), Math.round(98  * scH));
    }
  }

  /* ── Send: open default email client addressed to designer ── */
  sendBtn.addEventListener('click', () => {
    const isTech = badgeType === 'tech';
    const title = isTech ? 'הפניית כלכליסט-טק למובייל' : 'סטריפון כלכליסט';
    const subject = encodeURIComponent(title);
    const attached = isTech ? `מצורפת ${title}` : `מצורף ${title}`;
    const body = encodeURIComponent(`שלום,\n${attached}.\n\nנא להוריד את הקובץ (כפתור "הורד JPEG") ולצרף למייל זה.`);
    window.location.href = `mailto:design@ynet.co.il?subject=${subject}&body=${body}`;
  });

  /* ── Download: draw crop region at OUT_W×OUT_H + badge ── */
  downloadBtn.addEventListener('click', () => {
    if (!uploadedImg) return;
    outputCanvas.width  = OUT_W;
    outputCanvas.height = OUT_H;
    const octx = outputCanvas.getContext('2d');
    octx.drawImage(uploadedImg,
      cropX, cropY, cropW, cropH,   // source: crop region in image pixels
      0, 0, OUT_W, OUT_H            // dest: full output canvas
    );
    composeBadge(octx, OUT_W, OUT_H, badgeType);
    const q = 1.0;
    const a = document.createElement('a');
    a.download = `calcalist-stripon-${Date.now()}.jpg`;
    a.href = outputCanvas.toDataURL('image/jpeg', q);
    a.click();
    dlStatus.textContent = '✓ הורד בהצלחה!';
    dlStatus.className = 'status ok';
    setTimeout(() => { dlStatus.textContent = ''; dlStatus.className = 'status'; }, 3000);
  });
</script>
</body>
</html>
